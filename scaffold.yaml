project_title: A Map Reduce Library
version: 0.0.3

profile: andy-curtis/andy-curtis
template: cmake-c-git

depends_on:
  - https://github.com/contactandyc/the-io-library.git
  - https://github.com/contactandyc/a-memory-library.git
  - https://github.com/contactandyc/the-macro-library.git
apps:
  context:
    dest: examples
    depends_on:
      - https://github.com/contactandyc/a-map-reduce-library.git
      - https://github.com/contactandyc/a-json-library.git
      - https://github.com/contactandyc/a-json-sax-library.git
      - https://github.com/contactandyc/a-memory-library.git
  01_word_count:
    binaries:
      word_count:
        - src/main.c
  02_streaming_recommender:
    binaries:
      streaming_recommender:
        - src/*.c
  03_pipeline_recommender:
    binaries:
      pipeline_recommender:
        - src/main.c
        - src/pipeline_amazon.c
        - src/pipeline_enrich.c
        - src/pipeline_co_freq.c
      pipeline_sax_recommender:
        - src/main.c
        - src/pipeline_amazon_sax.c
        - src/pipeline_enrich.c
        - src/pipeline_co_freq.c
  04_inverted_recommender:
    binaries:
      inverted_recommender:
        - src/*.c
  05_complements_recommender:
    binaries:
      complements_recommender:
        - src/*.c
  06_substitutes_recommender:
    binaries:
      substitutes_recommender:
        - src/*.c
  07_buddies:
    binaries:
      buddies:
        - src/*.c
  08_conditional_branching:
    binaries:
      conditional_branching:
        - src/main.c
      conditional_pipeline_branching:
        - src/main_pipeline.c
  09_chaining:
    binaries:
      chaining:
        - src/*.c
